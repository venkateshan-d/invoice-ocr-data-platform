# Development Environment Configuration
variables:
  # Data storage paths
  volume_path: /Volumes/invoice_analytics_dev/bronze/raw_data/
  checkpoint_path: /Volumes/invoice_analytics_dev/bronze/checkpoints/
  
  # Data quality thresholds (lenient for dev)
  max_null_percentage: 0.20
  duplicate_threshold: 0.10
  
  # Processing settings
  batch_size: 1000
  enable_monitoring: true

# Dev-specific job settings
resources:
  jobs:
    invoice_data_pipeline_job:
      max_retries: 1
      timeout_seconds: 3600
      
      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            num_workers: 2  # Smaller cluster for dev
