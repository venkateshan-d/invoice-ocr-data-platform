# Production Environment Configuration
variables:
  # Data storage paths
  volume_path: /Volumes/invoice_analytics/bronze/raw_data/
  checkpoint_path: /Volumes/invoice_analytics/bronze/checkpoints/
  
  # Data quality thresholds (strict for prod)
  max_null_percentage: 0.05
  duplicate_threshold: 0.02
  
  # Processing settings
  batch_size: 10000
  enable_monitoring: true
  enable_alerts: true
  
  # SLA settings
  max_processing_time_hours: 2
  data_freshness_threshold_hours: 24

# Prod-specific job settings
resources:
  jobs:
    invoice_data_pipeline_job:
      max_retries: 3
      timeout_seconds: 7200
      
      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            num_workers: 4  # Larger cluster for prod
      
      schedule:
        pause_status: UNPAUSED  # Active in prod
      
      email_notifications:
        on_failure:
          - ${var.user_email}
        on_success:
          - ${var.user_email}
