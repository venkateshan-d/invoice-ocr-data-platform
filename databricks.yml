# Databricks Asset Bundle Configuration
# Deploy with: databricks bundle deploy -t dev
# Run with: databricks bundle run -t dev invoice_data_pipeline

bundle:
  name: invoice-ocr-data-platform
  
variables:
  catalog_name:
    description: Unity Catalog name for the project
    default: invoice_analytics
  
  environment:
    description: Deployment environment (dev or prod)
    default: dev
  
  user_email:
    description: User email for workspace paths
    default: arunvenkatesh910@gmail.com

targets:
  dev:
    mode: development
    workspace:
      host: https://dbc-2492ca8b-3d5c.cloud.databricks.com
    
    variables:
      catalog_name: invoice_analytics_dev
      environment: dev
    
    resources:
      jobs:
        invoice_data_pipeline:
          name: "[DEV] Invoice Data Pipeline"
          job_clusters:
            - job_cluster_key: main_cluster
              new_cluster:
                spark_version: "15.4.x-scala2.12"
                node_type_id: "i3.xlarge"
                num_workers: 2
                spark_conf:
                  "spark.databricks.delta.preview.enabled": "true"
          
          tasks:
            - task_key: bronze_ingestion
              job_cluster_key: main_cluster
              notebook_task:
                notebook_path: ./notebooks/01_bronze_ingestion.py
                base_parameters:
                  catalog_name: ${var.catalog_name}
                  environment: ${var.environment}
            
            - task_key: silver_transformation
              depends_on:
                - task_key: bronze_ingestion
              job_cluster_key: main_cluster
              notebook_task:
                notebook_path: ./notebooks/02_silver_transformation.py
                base_parameters:
                  catalog_name: ${var.catalog_name}
                  environment: ${var.environment}
            
            - task_key: gold_analytics
              depends_on:
                - task_key: silver_transformation
              job_cluster_key: main_cluster
              notebook_task:
                notebook_path: ./notebooks/03_gold_analytics.py
                base_parameters:
                  catalog_name: ${var.catalog_name}
                  environment: ${var.environment}
          
          schedule:
            quartz_cron_expression: "0 0 2 * * ?"  # Daily at 2 AM
            timezone_id: "America/Los_Angeles"
            pause_status: PAUSED
          
          email_notifications:
            on_failure:
              - ${var.user_email}
          
          max_concurrent_runs: 1

  prod:
    mode: production
    workspace:
      host: https://dbc-2492ca8b-3d5c.cloud.databricks.com
      root_path: /Workspace/Users/${var.user_email}/invoice-ocr-data-platform/.bundle/prod
    
    variables:
      catalog_name: invoice_analytics
      environment: prod
    
    resources:
      jobs:
        invoice_data_pipeline:
          name: "[PROD] Invoice Data Pipeline"
          job_clusters:
            - job_cluster_key: main_cluster
              new_cluster:
                spark_version: "15.4.x-scala2.12"
                node_type_id: "i3.xlarge"
                num_workers: 4
                spark_conf:
                  "spark.databricks.delta.preview.enabled": "true"
          
          tasks:
            - task_key: bronze_ingestion
              job_cluster_key: main_cluster
              notebook_task:
                notebook_path: ./notebooks/01_bronze_ingestion.py
                base_parameters:
                  catalog_name: ${var.catalog_name}
                  environment: ${var.environment}
            
            - task_key: silver_transformation
              depends_on:
                - task_key: bronze_ingestion
              job_cluster_key: main_cluster
              notebook_task:
                notebook_path: ./notebooks/02_silver_transformation.py
                base_parameters:
                  catalog_name: ${var.catalog_name}
                  environment: ${var.environment}
            
            - task_key: gold_analytics
              depends_on:
                - task_key: silver_transformation
              job_cluster_key: main_cluster
              notebook_task:
                notebook_path: ./notebooks/03_gold_analytics.py
                base_parameters:
                  catalog_name: ${var.catalog_name}
                  environment: ${var.environment}
          
          schedule:
            quartz_cron_expression: "0 0 2 * * ?"  # Daily at 2 AM
            timezone_id: "America/Los_Angeles"
            pause_status: UNPAUSED
          
          email_notifications:
            on_failure:
              - ${var.user_email}
            on_success:
              - ${var.user_email}
          
          max_concurrent_runs: 1