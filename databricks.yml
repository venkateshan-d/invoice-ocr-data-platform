# Databricks Asset Bundle Configuration
# Deploy with: databricks bundle deploy -t dev
# Run with: databricks bundle run -t dev invoice_data_pipeline_job

bundle:
  name: invoice-ocr-data-platform

variables:
  catalog_name:
    description: Unity Catalog name for the project
    default: invoice_analytics
  
  environment:
    description: Deployment environment
    default: dev
  
  user_email:
    description: User email for notifications
    default: arunvenkatesh910@gmail.com

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-2492ca8b-3d5c.cloud.databricks.com
    
    variables:
      catalog_name: invoice_analytics_dev
      environment: dev

  prod:
    mode: production
    workspace:
      host: https://dbc-2492ca8b-3d5c.cloud.databricks.com
    
    variables:
      catalog_name: invoice_analytics
      environment: prod

# Include workflow definitions
include:
  - workflows/*.yml
