resources:
  jobs:
    invoice_data_pipeline_job:
      name: "[${var.environment}] Invoice Data Pipeline"
      
      git_source:
        git_url: https://github.com/venkateshan-d/invoice-ocr-data-platform
        git_provider: gitHub
        git_branch: main
      
      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: notebooks/01_bronze_ingestion
            source: GIT
            base_parameters:
              catalog_name: ${var.catalog_name}
              environment: ${var.environment}
              test_mode: "false"  # Full production: process all 8,137 images
        
        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: notebooks/02_silver_transformation
            source: GIT
            base_parameters:
              catalog_name: ${var.catalog_name}
              environment: ${var.environment}
              test_mode: "false"  # Full production: process all records
              batch_size: "100"    # Process in batches of 100
        
        - task_key: gold_analytics
          depends_on:
            - task_key: silver_transformation
          notebook_task:
            notebook_path: notebooks/03_gold_analytics
            source: GIT
            base_parameters:
              catalog_name: ${var.catalog_name}
              environment: ${var.environment}
      
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"  # Daily at 2 AM
        timezone_id: "America/Los_Angeles"
        pause_status: PAUSED
      
      email_notifications:
        on_failure:
          - ${var.user_email}
      
      max_concurrent_runs: 1
