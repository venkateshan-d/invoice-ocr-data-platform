resources:
  jobs:
    invoice_data_pipeline_job:
      name: "[${var.environment}] Invoice Data Pipeline"
      
      git_source:
        git_url: https://github.com/venkateshan-d/invoice-ocr-data-platform
        git_provider: github
        git_branch: main
      
      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
            spark_conf:
              "spark.databricks.delta.preview.enabled": "true"
      
      tasks:
        - task_key: bronze_ingestion
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: notebooks/01_bronze_ingestion
            source: GIT
            base_parameters:
              catalog_name: ${var.catalog_name}
              environment: ${var.environment}
        
        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: notebooks/02_silver_transformation
            source: GIT
            base_parameters:
              catalog_name: ${var.catalog_name}
              environment: ${var.environment}
        
        - task_key: gold_analytics
          depends_on:
            - task_key: silver_transformation
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: notebooks/03_gold_analytics
            source: GIT
            base_parameters:
              catalog_name: ${var.catalog_name}
              environment: ${var.environment}
      
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"  # Daily at 2 AM
        timezone_id: "America/Los_Angeles"
        pause_status: PAUSED
      
      email_notifications:
        on_failure:
          - ${var.user_email}
      
      max_concurrent_runs: 1
